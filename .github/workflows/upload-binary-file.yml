name: Upload asset

# Receives a base64-chunked asset as a JSON payload, reconstructs it, verifies
# its hash, optimizes it, embeds metadata, optionally builds thumbnail/favicon,
# then commits and pushes. All logic lives in Scripts/artlib; this workflow only
# wires inputs to the entrypoint. The resulting push triggers Asset Index and
# Validate Assets, so the index/report self-heal without a manual step.

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "JSON payload for binary asset upload"
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Determine target branch
        id: branch
        shell: bash
        env:
          PAYLOAD_JSON: ${{ inputs.payload }}
        run: |
          branch="$(python3 -c 'import json,os,re,sys; b=json.loads(os.environ["PAYLOAD_JSON"]).get("branch",""); sys.exit("bad branch") if not re.match(r"^[A-Za-z0-9._/\-]+$", b) else print(b)')"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.branch }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r Scripts/requirements.txt

      - name: Setup image tools
        uses: ./.github/actions/setup-image-tools

      - name: Upload asset
        env:
          ARTLIB_PAYLOAD: ${{ inputs.payload }}
        run: python Scripts/upload_asset.py
