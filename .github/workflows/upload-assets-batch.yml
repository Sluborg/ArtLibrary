name: Upload assets (batch)

# Receives many base64-chunked assets in one JSON payload, reconstructs each,
# verifies hashes, optimizes, embeds metadata, optionally builds
# thumbnails/favicons, rebuilds the index/report, validates, then commits ALL of
# them in a single commit. All logic lives in Scripts/artlib; this workflow only
# wires the input to the entrypoint. Preferred over many single dispatches when
# Lubot generates multiple assets — one run, one commit, one verified result.

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "JSON batch payload ({branch, commit_message, assets:[...]})"
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Determine target branch
        id: branch
        shell: bash
        env:
          PAYLOAD_JSON: ${{ inputs.payload }}
        run: |
          branch="$(python3 -c 'import json,os,re,sys; b=json.loads(os.environ["PAYLOAD_JSON"]).get("branch",""); sys.exit("bad branch") if not re.match(r"^[A-Za-z0-9._/\-]+$", b) else print(b)')"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.branch }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r Scripts/requirements.txt

      - name: Setup image tools
        uses: ./.github/actions/setup-image-tools

      - name: Upload asset batch
        env:
          ARTLIB_PAYLOAD: ${{ inputs.payload }}
        run: python Scripts/upload_assets_batch.py
